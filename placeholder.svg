<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Background with pink gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rectangle -->
  <rect width="300" height="300" rx="12" ry="12" fill="url(#bgGradient)" />

  <!-- Dashed border to indicate placeholder area -->
  <rect x="15" y="15" width="270" height="270" rx="8" ry="8" fill="none" stroke="#FF69B4" stroke-width="2" stroke-dasharray="8,4" opacity="0.6" />

  <!-- Camera icon (simplified) -->
  <g transform="translate(150, 120)">
    <!-- Camera body -->
    <rect x="-45" y="-20" width="90" height="60" rx="8" ry="8" fill="url(#iconGradient)" opacity="0.8" />
    <!-- Camera lens -->
    <circle cx="0" cy="10" r="20" fill="none" stroke="#FFF0F5" stroke-width="3" />
    <circle cx="0" cy="10" r="12" fill="#FFF0F5" opacity="0.3" />
    <!-- Camera flash/viewfinder -->
    <rect x="-15" y="-30" width="30" height="12" rx="3" ry="3" fill="url(#iconGradient)" opacity="0.6" />
  </g>

  <!-- "Foto" text -->
  <text x="150" y="200" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#FF1493" text-anchor="middle" letter-spacing="2">
    Foto
  </text>

  <!-- Subtitle hint -->
  <text x="150" y="235" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#FF69B4" text-anchor="middle" opacity="0.8">
    Letakkan foto di sini
  </text>

  <!-- Small decorative hearts -->
  <text x="50" y="50" font-size="18" opacity="0.4">💕</text>
  <text x="240" y="50" font-size="18" opacity="0.4">💕</text>
  <text x="50" y="270" font-size="18" opacity="0.4">💕</text>
  <text x="240" y="270" font-size="18" opacity="0.4">💕</text>
</svg>
